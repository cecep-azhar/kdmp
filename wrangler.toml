# Cloudflare Pages Configuration for KDMP (Koperasi Desa Merah Putih)
# Docs: https://developers.cloudflare.com/pages/platform/build-configuration

name = "kdmp"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

# For Next.js on Cloudflare Pages, output directory
pages_build_output_dir = ".vercel/output/static"

# Environment variables to be set in Cloudflare Pages dashboard:
# - DATABASE_URL: PostgreSQL connection string (Neon, Supabase, or other Postgres provider)
# - PAYLOAD_SECRET: Random secret for Payload CMS encryption
# - S3_BUCKET, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY, S3_REGION: For media storage (optional, can use R2)
# - NEXT_PUBLIC_APP_URL: Your Cloudflare Pages URL

# Note: Payload CMS requires PostgreSQL. Cloudflare Workers/Pages does not natively support
# Postgres connections. Use an external Postgres provider like:
# - Neon (neon.tech) - Serverless Postgres
# - Supabase (supabase.com) - Postgres with additional features
# - Railway (railway.app) - Simple Postgres hosting
# - Aiven (aiven.io) - Managed Postgres

[vars]
NEXT_PUBLIC_APP_URL = "https://your-app.pages.dev"
